<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | zeroのblog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-form {
            max-width: 800px;
            margin: 0 auto;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            color: var(--color-text);
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        .preview-area {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <header class="glass">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <a href="index.html" style="text-decoration: none;"><h2 style="margin: 0; color: var(--color-primary);">zeroのblog Admin</h2></a>
            </div>
            <nav style="display: flex; align-items: center;">
                <ul style="list-style: none; display: flex; gap: var(--spacing-lg);">
                    <li><a href="index.html">Back to Site</a></li>
                </ul>
                <button id="theme-toggle">Mode</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="section">
            <h1 style="margin-bottom: var(--spacing-lg);">新しい記事を作成</h1>
            
            <form id="post-form" class="glass admin-form">
                <label for="post-title">タイトル</label>
                <input type="text" id="post-title" placeholder="記事のタイトルを入力..." required>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md);">
                    <div>
                        <label for="post-category">カテゴリ</label>
                        <select id="post-category">
                            <option value="GENERAL">GENERAL</option>
                            <option value="DEVELOPMENT">DEVELOPMENT</option>
                            <option value="DESIGN">DESIGN</option>
                            <option value="TECH">TECH</option>
                        </select>
                    </div>
                    <div>
                        <label for="post-readtime">読了時間 (分)</label>
                        <input type="number" id="post-readtime" value="5" min="1">
                    </div>
                </div>

                <label for="post-content">本文 (HTMLタグも使えます)</label>
                <textarea id="post-content" rows="15" placeholder="記事の内容をここに入力..." required></textarea>

                <div style="display: flex; gap: var(--spacing-md);">
                    <button type="submit" class="btn btn-silver" style="flex: 2;">記事を公開する (Publish)</button>
                    <button type="button" id="clear-posts" class="btn btn-primary" style="flex: 1; border-color: #ff4d4d; color: #ff4d4d;">全記事削除 (Reset)</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 zeroのblog - Admin Console</p>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        // Admin-specific logic
        document.getElementById('post-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('post-title').value;
            const category = document.getElementById('post-category').value;
            const readTime = document.getElementById('post-readtime').value;
            const content = document.getElementById('post-content').value;
            
            const post = {
                id: Date.now().toString(),
                title,
                category,
                readTime,
                content,
                date: new Date().toLocaleDateString('ja-JP')
            };

            // Save to LocalStorage
            const posts = JSON.parse(localStorage.getItem('user_posts') || '[]');
            posts.unshift(post);
            localStorage.setItem('user_posts', JSON.stringify(posts));

            alert('記事が投稿されました！');
            window.location.href = 'index.html';
        });

        document.getElementById('clear-posts').addEventListener('click', () => {
            if(confirm('本当に全ての投稿記事を削除しますか？')) {
                localStorage.removeItem('user_posts');
                alert('削除完了');
                window.location.reload();
            }
        });
    </script>
</body>
</html>
