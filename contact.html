<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | zeroのblog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            color: var(--color-text);
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <header class="glass">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <a href="index.html" style="text-decoration: none;"><h2 style="margin: 0; color: var(--color-primary);">zeroのblog</h2></a>
            </div>
            <nav style="display: flex; align-items: center;">
                <ul style="list-style: none; display: flex; gap: var(--spacing-lg);">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
                <button id="theme-toggle">Mode</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="section">
            <div style="max-width: 600px; margin: 0 auto;">
                <h1>Contact</h1>
                <p style="color: var(--color-secondary); margin-bottom: var(--spacing-xl);">
                    フィードバックやお問い合わせはこちらから。お気軽にメッセージを送ってください。
                </p>

                <form class="glass">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your Name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="email@example.com" required>

                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="How can I help you?" required></textarea>

                    <button type="submit" class="btn btn-silver" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 zeroのblog. Constructed with Vanilla JS and Passion.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
